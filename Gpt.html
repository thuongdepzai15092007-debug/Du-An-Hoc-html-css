<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Đặt Hàng</title>
    <link >

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: #f4f6f9;
        }

        /* HEADER */

        header{
            background: black;
            color: white;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1{
            font-size: 30px;
        }

        nav a{
            text-decoration: none;
            color: white;
            margin-left: 20px;
            font-size: 18px;
            transition: 0.3s;
        }

        nav a:hover{
            color: #dbeafe;
        }

        /* BANNER */

        .banner{
            height: 350px;
            background: linear-gradient(to right, #2563eb, #60a5fa);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            text-align: center;
        }

        .banner h2{
            font-size: 45px;
            margin-bottom: 15px;
        }

        .banner p{
            font-size: 20px;
            margin-bottom: 20px;
        }

        .banner button{
            padding: 12px 25px;
            border: none;
            background: white;
            color: #2563eb;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .banner button:hover{
            background: #dbeafe;
        }

        /* PRODUCTS */

        .container{
            width: 90%;
            margin: 40px auto;
        }

        .title{
            text-align: center;
            margin-bottom: 30px;
            font-size: 35px;
            color: #1e293b;
        }

        .products{
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
            gap: 25px;
        }

        .card{
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .card:hover{
            transform: translateY(-8px);
        }

        .card img{
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .card-content{
            padding: 20px;
        }

        .card-content h3{
            margin-bottom: 10px;
            color: #0f172a;
        }

        .price{
            color: #2563eb;
            font-size: 22px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .card-content button{
            width: 100%;
            padding: 12px;
            border: none;
            background: #2563eb;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .card-content button:hover{
            background: #1d4ed8;
        }

        /* FOOTER */

        footer{
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 50px;
        }

    </style>
</head>

<body>

    <!-- HEADER -->

    <header>

        <h1>SHOP ONLINE</h1>

        <nav>
            <a href="#">Trang chủ</a>
            <a href="#">Sản phẩm</a>
            <a href="#">Khuyến mãi</a>
            <a href="#">Liên hệ</a>
        </nav>

    </header>

    <!-- BANNER -->

    <section class="banner">

        <h2>Mua Sắm Nhanh Chóng</h2>

        <p>Giao diện web đặt hàng hiện đại và đẹp mắt</p>

        <button>Mua Ngay</button>

    </section>

    <!-- PRODUCTS -->

    <div class="container">

        <h2 class="title">Sản Phẩm Nổi Bật</h2>

        <div class="products">

            <div class="card">

                <img src="https://picsum.photos/400/300?1">

                <div class="card-content">

                    <h3>Tai Nghe Gaming</h3>

                    <div class="price">450.000đ</div>

                    <button>Đặt Hàng</button>

                </div>

            </div>

            <div class="card">

                <img src="https://picsum.photos/400/300?2">

                <div class="card-content">

                    <h3>Bàn Phím Cơ</h3>

                    <div class="price">890.000đ</div>

                    <button>Đặt Hàng</button>

                </div>

            </div>

            <div class="card">

                <img src="https://picsum.photos/400/300?3">

                <div class="card-content">

                    <h3>Chuột Không Dây</h3>

                    <div class="price">320.000đ</div>

                    <button>Đặt Hàng</button>

                </div>

            </div>

            <div class="card">

                <img src="https://picsum.photos/400/300?4">

                <div class="card-content">

                    <h3>Màn Hình LED</h3>

                    <div class="price">3.500.000đ</div>

                    <button>Đặt Hàng</button>

                </div>

            </div>

        </div>

    </div>

    <!-- FOOTER -->

    <footer>

        <p>© 2026 Web Đặt Hàng | Thiết kế bằng HTML & CSS</p>

    </footer>

</body>
</html>
```
